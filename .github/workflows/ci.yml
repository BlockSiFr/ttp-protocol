name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: CLI, Examples, and Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Documentation smoke check
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f docs/getting-started.md
          test -f docs/integration-guide.md
          test -f docs/open-source-boundary.md
          test -f docs/ops/persistent-storage.md

      - name: Compile Python SDK
        run: python -m py_compile sdk/python/client.py

      - name: Build TypeScript SDK
        run: npm run build:sdk

      - name: Build Trust Authority reference
        run: npm run build:trust-authority

      - name: Show CLI version
        run: npm run ttp -- version

      - name: Check TTP examples
        run: npm run check:examples

      - name: Run local adoption demo
        run: npm run demo

      - name: Run tests
        run: npm test
