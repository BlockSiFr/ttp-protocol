name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Demo and Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run local adoption demo
        run: npm run demo

      - name: Run trust-routing tests
        run: npm run test:trust-routing
