name: CI

on:
  pull_request:
  push:
    branches: [ main, work ]

jobs:
  trust-routing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Run trust-routing tests
        run: npm run test:trust-routing

  trust-authority:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference-implementations/trust-authority
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
