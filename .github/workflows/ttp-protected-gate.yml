name: TTP / Protected Action Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  protected-action-gate:
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.evaluate.outputs.decision }}
      receipt_id: ${{ steps.evaluate.outputs.receipt_id }}
      reason: ${{ steps.evaluate.outputs.reason }}
      needs_reauth: ${{ steps.evaluate.outputs.needs_reauth }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: Evaluate protected change
        id: evaluate
        env:
          AUTH_URL: ${{ secrets.RUNTIME_AUTH_URL }}
          AUTH_TOKEN: ${{ secrets.RUNTIME_AUTH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          DECISION="DENY"
          RECEIPT_ID=""
          REASON="evaluation_not_started"
          NEEDS_REAUTH="false"

          emit() {
            echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
            echo "receipt_id=$RECEIPT_ID" >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "needs_reauth=$NEEDS_REAUTH" >> "$GITHUB_OUTPUT"
          }

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed.txt || {
            REASON="git_diff_failed"
            emit && exit 0
          }

          PATHS_JSON=$(jq -R . < changed.txt | jq -s .)

          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg actor "${{ github.actor }}" \
            --arg sha "$HEAD_SHA" \
            --argjson paths "$PATHS_JSON" \
            '{
              subject: "wi://ttp/github/security-review-agent",
              action: "merge request",
              repo: $repo,
              commitSha: $sha,
              invokingActor: $actor,
              pathsTouched: $paths
            }' > request.json

          [[ -z "$AUTH_URL" || -z "$AUTH_TOKEN" ]] && {
            REASON="missing_runtime_authority_configuration"
            emit && exit 0
          }

          HTTP_CODE=$(curl -s -o decision.json -w '%{http_code}' \
            -X POST "$AUTH_URL/re/authorize" \
            -H "Authorization: Bearer $AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d @request.json || true)

          jq empty decision.json || {
            REASON="authority_invalid_json"
            emit && exit 0
          }

          DECISION=$(jq -r '.decision // "DENY"' decision.json)
          RECEIPT_ID=$(jq -r '.receiptId // empty' decision.json)
          REASON=$(jq -r '.reason // "no_reason"' decision.json)

          [[ "$DECISION" =~ STEP_UP|ESCALATE ]] && NEEDS_REAUTH="true"

          emit

  receipt-required:
    needs: protected-action-gate
    runs-on: ubuntu-latest
    if: needs.protected-action-gate.outputs.receipt_id != ''
    steps:
      - run: echo "Receipt present"

  merge-authority:
    needs: [protected-action-gate, receipt-required]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.protected-action-gate.outputs.decision }}" != "PERMIT" ]; then
            echo "Merge denied"
            exit 1
          fi
          echo "Merge permitted"
