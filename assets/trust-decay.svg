<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-label="trust-decay.svg"><defs><style>.bg{fill:#0A0A0F}.panel{fill:#12141C;stroke:#00D4FF;stroke-width:1.5}.line{stroke:#00D4FF;stroke-width:2;fill:none;marker-end:url(#a)}.good{stroke:#00E676}.warn{stroke:#FFB300}.bad{stroke:#FF3D00}.t{fill:#E6F7FF;font:600 16px Arial}.s{fill:#A9B7C6;font:12px Arial}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#00D4FF"/></marker></defs><rect class="bg" width="900" height="360"/><polyline points="80,90 280,130 480,190 700,280" fill="none" stroke="#FFB300" stroke-width="4"/><circle cx="80" cy="90" r="8" fill="#00E676"/><circle cx="280" cy="130" r="8" fill="#00D4FF"/><circle cx="480" cy="190" r="8" fill="#FFB300"/><circle cx="700" cy="280" r="8" fill="#FF3D00"/><path class="line good" d="M620 270 C560 180 490 130 360 110"/><text class="t" x="60" y="50">Trusted</text><text class="t" x="240" y="90">Degrading</text><text class="t" x="440" y="155">Warning</text><text class="t" x="650" y="250">Untrusted</text><text class="s" x="500" y="95">attestation recharge restores trustworthiness</text></svg>
