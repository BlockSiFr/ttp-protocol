<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="trust-proof.svg"><defs><style>.bg{fill:#0A0A0F}.panel{fill:#12141C;stroke:#00D4FF;stroke-width:1.5}.line{stroke:#00D4FF;stroke-width:2;fill:none;marker-end:url(#a)}.good{stroke:#00E676}.warn{stroke:#FFB300}.bad{stroke:#FF3D00}.t{fill:#E6F7FF;font:600 16px Arial}.s{fill:#A9B7C6;font:12px Arial}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#00D4FF"/></marker></defs><rect class="bg" width="980" height="420"/><rect class="panel" x="60" y="70" width="180" height="70" rx="6"/><text class="t" x="76" y="98">Subject</text><text class="s" x="76" y="120">actor</text><rect class="panel" x="300" y="70" width="180" height="70" rx="6"/><text class="t" x="316" y="98">TrustClaim</text><text class="s" x="316" y="120">scoped state</text><rect class="panel" x="540" y="70" width="180" height="70" rx="6"/><text class="t" x="556" y="98">TrustIssuer</text><text class="s" x="556" y="120">issuer proof</text><rect class="panel" x="300" y="190" width="180" height="70" rx="6"/><text class="t" x="316" y="218">Attestation</text><text class="s" x="316" y="240">fresh evidence</text><rect class="panel" x="540" y="190" width="180" height="70" rx="6"/><text class="t" x="556" y="218">Freshness</text><text class="s" x="556" y="240">time bound</text><rect class="panel" x="300" y="310" width="180" height="70" rx="6"/><text class="t" x="316" y="338">TrustDecay</text><text class="s" x="316" y="360">effective trust</text><rect class="panel" x="540" y="310" width="180" height="70" rx="6"/><text class="t" x="556" y="338">Scope</text><text class="s" x="556" y="360">constraints</text><rect class="panel" x="780" y="190" width="150" height="90" rx="6"/><text class="t" x="796" y="218">Proof result</text><text class="s" x="796" y="240">valid or failed</text><path class="line" d="M240 105 H300"/><path class="line" d="M480 105 H540"/>