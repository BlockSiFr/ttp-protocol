<svg xmlns="http://www.w3.org/2000/svg" width="940" height="520" viewBox="0 0 940 520" role="img" aria-label="execution-receipt.svg"><defs><style>.bg{fill:#0A0A0F}.panel{fill:#12141C;stroke:#00D4FF;stroke-width:1.5}.line{stroke:#00D4FF;stroke-width:2;fill:none;marker-end:url(#a)}.good{stroke:#00E676}.warn{stroke:#FFB300}.bad{stroke:#FF3D00}.t{fill:#E6F7FF;font:600 16px Arial}.s{fill:#A9B7C6;font:12px Arial}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#00D4FF"/></marker></defs><rect class="bg" width="940" height="520"/><rect class="panel" x="70" y="50" width="220" height="58" rx="6"/><text class="t" x="86" y="78">Subject</text><text class="s" x="86" y="100">agent or NHI</text><rect class="panel" x="70" y="125" width="220" height="58" rx="6"/><text class="t" x="86" y="153">Action</text><text class="s" x="86" y="175">requested operation</text><rect class="panel" x="70" y="200" width="220" height="58" rx="6"/><text class="t" x="86" y="228">Resource</text><text class="s" x="86" y="250">protected target</text><rect class="panel" x="360" y="50" width="220" height="58" rx="6"/><text class="t" x="376" y="78">Decision</text><text class="s" x="376" y="100">runtime result</text><rect class="panel" x="360" y="125" width="220" height="58" rx="6"/><text class="t" x="376" y="153">TrustProof ref</text><text class="s" x="376" y="175">proof pointer</text><rect class="panel" x="360" y="200" width="220" height="58" rx="6"/><text class="t" x="376" y="228">AuthorityGrant ref</text><text class="s" x="376" y="250">grant pointer</text><rect class="panel" x="650" y="50" width="220" height="58" rx="6"/><text class="t" x="666" y="78">Attestation ref</text><text class="s" x="666" y="100">evidence pointer</text><rect class="panel" x="650" y="125" width="220" height="58" rx="6"/><text class="t" x="666" y="153">Timestamp</text><text class="s" x="666" y="175">clock context</text><rect class="panel" x="650" y="200" width="220" height="58" rx="6"/><text class="t" x="666" y="228">Signature</text><text class="s" x="666" y="250">signed receipt</text><rect class="panel" x="360" y="330" width="220" height="58" rx="6"/><text class="t" x="376" y="358">Chain hash</text><text class="s" x="376" y="380">receipt chain</text><path class="line" d="M290 80 H360"/><path class="line" d="M290 155 H360"/><path class="line" d="M290 230 H360"/><path class="line" d="M580 80 H650"/><path class="line" d="M580 155 H650"/><path class="line" d="M580 230 H650"/><path class="line" d="M470 258 V330"/></svg>
